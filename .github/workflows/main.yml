name: Permission admin verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: permission_admin
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: training
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d permission_admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:training@127.0.0.1:5432/permission_admin?schema=public
      BETTER_AUTH_SECRET: permission-admin-ci-secret-at-least-32-characters
      BETTER_AUTH_URL: http://localhost:3000
      PLAYWRIGHT_HEADLESS: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm migrate

      - name: Run interface tests
        run: pnpm test:run

      - name: Run lint
        run: pnpm lint

      - name: Check TypeScript
        run: pnpm typecheck

      - name: Build production application
        run: pnpm build

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser acceptance tests
        run: pnpm test-e2e

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: playwright/test-results
          if-no-files-found: ignore
