services:
  db:
    image: postgres:16-alpine
    container_name: permission-admin-db
    environment:
      POSTGRES_DB: permission_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: training
    ports:
      - "127.0.0.1:15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d permission_admin"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - permission-admin-data:/var/lib/postgresql/data

volumes:
  permission-admin-data:
